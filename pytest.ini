[pytest]
# tests/ 디렉토리만 자동 수집. backend/ frontend/ scripts/ 안의 doctest 류는 의도적
# 으로 제외 — 모듈 import 시 무거운 의존성이 끌려 들어와 collect 단계에서 느려짐.
testpaths = tests

# ─── Marker 정책 ────────────────────────────────────────────────────────
# 마커 없는 (default) 테스트는 CPU + mock + fixture 만 사용 — GitHub Actions CI
# 가 매 push 마다 실행. 실 인프라/하드웨어 필요한 테스트는 마커로 분류하고 CI 에서
# 는 deselect, 로컬에서 명시적으로 `pytest -m gpu` / `-m integration` / `-m llm`
# 으로 골라 실행.
markers =
    gpu: GPU/CUDA 가 필요한 테스트 (sentence-transformers 임베딩, vLLM 등)
    integration: Postgres/Qdrant/Ollama 등 외부 인프라가 떠 있어야 도는 테스트
    llm: 실 LLM provider (Ollama/OpenAI/Claude) 호출이 필요한 테스트 — 비용/시간 큼
    slow: 시간이 오래 걸리는 테스트 (>10s) — 일반 PR CI 에선 skip 가능

# CI 기본: 마커 붙은 것 자동 deselect (= 위 셋 다 안 도는 default suite 만).
# 로컬에서 전체 실행하려면: `pytest -m ''` 또는 `pytest --no-marker-filter`.
addopts = -m "not gpu and not integration and not llm"

# pytest-asyncio 의 strict 모드 — 명시적 @pytest.mark.asyncio 만 인식
asyncio_mode = strict
