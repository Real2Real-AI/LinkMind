[pytest]
# tests/ 디렉토리만 자동 수집. backend/ frontend/ scripts/ 안의 doctest 류는 의도적
# 으로 제외 — 모듈 import 시 무거운 의존성이 끌려 들어와 collect 단계에서 느려짐.
testpaths = tests

# ─── Marker 정책 ────────────────────────────────────────────────────────
# 마커 없는 (default) 테스트는 CPU + mock + fixture 만 사용 — GitHub Actions CI
# 가 매 push 마다 실행. 실 인프라/하드웨어 필요한 테스트는 마커로 분류하고 CI 에서
# 는 deselect, 로컬에서 명시적으로 `pytest -m gpu` / `-m integration` / `-m llm`
# 으로 골라 실행.
markers =
    gpu: CUDA device 가 필요한 테스트 — 로컬 (RTX 4090) 에서만. CI 에서 자동 deselect.
    embedding: sentence-transformers 임베딩 smoke — 가벼운 모델 (MiniLM) 이라 CPU
               에서도 가능. CI 에서 모델 다운로드 + 첫 임베딩 ~30-60초 추가.
    integration: Postgres/Qdrant 등 외부 인프라가 떠 있어야 도는 e2e — 미가동이면
                 fixture 가 pytest.skip (CI 에서 안전하게 자동 skip).
    llm: 실 LLM provider (Ollama/OpenAI/Claude) 호출 필요 — Ollama 미가동/API key
         미설정이면 fixture 가 skip. 비용/시간 큼.
    slow: 시간이 오래 걸리는 테스트 (>10s) — 일반 PR CI 에선 skip 가능.

# 정책:
#   - 로컬: 전체 실행 `pytest -m ''` 또는 `bash scripts/tests/run.sh --all`.
#   - GitHub CI: GPU 만 deselect — 나머지 (embedding/integration/llm) 는 시도하되,
#     실 인프라 미가동 시 각 fixture 가 자동 skip.
#   - 빠른 default (모델 다운로드 없는 4초 suite) 만 보려면 `-m "not gpu and not embedding"`.
addopts = -m "not gpu"

# pytest-asyncio 의 strict 모드 — 명시적 @pytest.mark.asyncio 만 인식
asyncio_mode = strict
